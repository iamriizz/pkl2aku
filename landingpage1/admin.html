<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Pengelola | KFC Online</title>
  <meta name="description" content="Dashboard admin untuk mengelola pesanan, menu, promo, dan outlet KFC Online." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header auth-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><span class="brand-mark">KFC</span><span><strong>Admin KFC</strong><small>Pengelola website</small></span></a>
      <nav class="site-nav"><a href="index.html">Beranda</a><a href="status.html">Status</a><a href="checkout.html">Checkout</a></nav>
      <div class="header-actions" id="auth-links"><span class="header-user hidden" id="header-user"></span><a class="btn btn-ghost hidden" id="logout-button" href="#">Keluar</a><a class="btn btn-ghost" id="login-link" href="login.html">Login</a><a class="btn btn-outline" id="register-link" href="register.html">Daftar</a></div>
    </div>
  </header>

  <main class="admin-page">
    <section class="container admin-hero">
      <div>
        <p class="overline">Dashboard admin</p>
        <h1>Pengelola Website</h1>
        <p>Kelola pesanan masuk, status order, menu unggulan, promo, dan outlet dari satu dashboard.</p>
      </div>
      <button class="btn btn-primary" id="seed-order-button">Buat Contoh Pesanan</button>
    </section>

    <section class="container admin-stats" id="admin-stats"></section>

    <section class="container admin-grid">
      <div class="admin-panel admin-panel-wide">
        <div class="admin-panel-header"><div><h2>Pesanan Masuk</h2><p>Ubah status pesanan pelanggan secara langsung.</p></div><button class="btn btn-outline btn-sm" id="clear-completed-button">Bersihkan Selesai</button></div>
        <div class="admin-orders" id="admin-orders"></div>
      </div>
      <div class="admin-panel">
        <h2>Menu Unggulan</h2>
        <form id="admin-menu-form" class="admin-form">
          <label for="menu-name">Nama menu</label><input id="menu-name" required placeholder="Contoh: Crispy Chicken Box" />
          <label for="menu-price">Harga</label><input id="menu-price" type="number" min="0" required placeholder="45000" />
          <button class="btn btn-primary full-width" type="submit">Tambah Menu</button>
        </form>
        <div class="admin-list" id="admin-menu-list"></div>
      </div>
      <div class="admin-panel">
        <h2>Promo Aktif</h2>
        <form id="admin-promo-form" class="admin-form">
          <label for="promo-title">Judul promo</label><input id="promo-title" required placeholder="Contoh: Bucket Hemat" />
          <label for="promo-discount">Diskon</label><input id="promo-discount" required placeholder="Hemat 25%" />
          <button class="btn btn-primary full-width" type="submit">Tambah Promo</button>
        </form>
        <div class="admin-list" id="admin-promo-list"></div>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
